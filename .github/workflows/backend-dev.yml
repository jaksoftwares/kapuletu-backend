name: Backend Deployment (DEV)

on:
  push:
    branches:
      - dev
  workflow_dispatch:

permissions:
  id-token: write # Required for OIDC
  contents: read

env:
  AWS_REGION: us-east-1 # Adjust as needed
  STAGE: dev
  PYTHON_VERSION: "3.11"

jobs:
  deploy:
    name: Test, Lint and Deploy to Dev
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: 🛒 Checkout Code
        # Fetches the latest source code from the repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        # Configures the Python environment with caching for faster runs
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest # Ensure CI tools are installed

      - name: 🔍 Linting (Ruff)
        run: ruff check .

      - name: 🧪 Run Tests (Pytest)
        run: pytest
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          QLDB_LEDGER_NAME: ${{ secrets.QLDB_LEDGER_NAME }}
          TWILIO_SECRET: ${{ secrets.TWILIO_SECRET }}

      - name: 🚀 Setup Node.js (for Serverless)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: ⚡ Install Serverless Framework
        # Required for packaging and deploying AWS Lambda functions
        run: npm install -g serverless

      - name: 🔐 Configure AWS Credentials (OIDC)
        # Authenticates securely with AWS using OpenID Connect (no keys needed)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/kapuletu-ci-cd-role-dev
          aws-region: ${{ env.AWS_REGION }}

      - name: 📦 Validate Package
        run: serverless package --stage ${{ env.STAGE }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          QLDB_LEDGER_NAME: ${{ secrets.QLDB_LEDGER_NAME }}
          TWILIO_SECRET: ${{ secrets.TWILIO_SECRET }}

      - name: 🚢 Deploy to AWS Lambda
        run: serverless deploy --stage ${{ env.STAGE }} --verbose
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          QLDB_LEDGER_NAME: ${{ secrets.QLDB_LEDGER_NAME }}
          TWILIO_SECRET: ${{ secrets.TWILIO_SECRET }}

      - name: ✨ Deployment Summary
        run: |
          echo "### ✅ Deployment Successful" >> $GITHUB_STEP_SUMMARY
          echo "- **Stage:** ${{ env.STAGE }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Region:** ${{ env.AWS_REGION }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
